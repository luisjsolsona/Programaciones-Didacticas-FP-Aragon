# =============================================================
# frontend/nginx.conf — Configuración de Nginx
#
# Dos bloques principales:
#   1. /api/  → proxy al backend Express (puerto 3001)
#   2. /      → sirve el HTML estático (SPA)
#
# Nginx actúa como punto de entrada único: el navegador solo
# habla con Nginx, nunca directamente con Express.
# =============================================================

server {
    listen 80;
    server_name _;

    # Límite de tamaño para peticiones entrantes (backups JSON pueden ser grandes)
    client_max_body_size 50M;

    # Carpeta raíz donde está el index.html
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy hacia la API ─────────────────────────────────
    # Todas las peticiones a /api/* se redirigen al backend.
    # El nombre 'backend' es el nombre del servicio en docker-compose.
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;

        # Cabeceras necesarias para que Express reciba la IP real
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts generosos para operaciones largas (export Word/PDF)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Ficheros estáticos ─────────────────────────────────
    # Sirve el HTML directamente.
    # Cualquier ruta que no sea /api/ devuelve el index.html
    # (necesario si en el futuro se añaden rutas en el frontend).
    location / {
        try_files $uri $uri/ /index.html;

        # Cache del HTML: no cachear para que siempre sea fresco
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
